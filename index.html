<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive Dwemer facility exploration in Skyrim">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <title>The Dwemer Facility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica:ital@0;1&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <img src="assets/icons/favicon.svg" alt="" width="28" height="28" class="header-favicon">
            <h1>The Dwemer Facility</h1>
            <div class="header-quick-actions">
                <button id="restart-btn" class="header-btn" aria-label="Restart game">
                    <img src="assets/icons/restart.svg" alt="" width="24" height="24">
                </button>
                <button id="rewind-btn" class="header-btn" aria-label="Load last checkpoint" disabled>
                    <img src="assets/icons/rewind.svg" alt="" width="24" height="24">
                </button>
            </div>
            <div class="header-actions">
                <button id="theme-btn" class="header-btn" aria-label="Toggle dark mode">
                    <img src="assets/icons/theme.svg" alt="" width="24" height="24">
                </button>
                <button id="dyslexic-btn" class="header-btn" aria-label="Toggle dyslexia-friendly font">
                    <img src="assets/icons/glasses.svg" alt="" width="24" height="24">
                </button>
                <button class="header-btn zoom-out-btn" aria-label="Decrease font size">
                    <img src="assets/icons/zoom-out.svg" alt="" width="24" height="24">
                </button>
                <button class="header-btn zoom-in-btn" aria-label="Increase font size">
                    <img src="assets/icons/zoom-in.svg" alt="" width="24" height="24">
                </button>
                <button id="tts-btn" class="header-btn" aria-label="Toggle text to speech">
                    <img id="tts-icon" src="assets/icons/microphone-mute.svg" alt="" width="24" height="24">
                </button>
                <button id="menu-btn" class="header-btn mobile-menu-btn" aria-label="Open menu">
                    <img src="assets/icons/menu.svg" alt="" width="24" height="24">
                </button>
            </div>
        </header>

        <!-- Inventory bar -->
        <div id="inventory-bar" aria-expanded="false">
            <button id="inventory-toggle" aria-expanded="false" aria-controls="inventory-panel">
                <span>Inventory</span>
                <span class="inventory-chevron" aria-hidden="true"></span>
            </button>
            <div class="inventory-panel-wrapper" id="inventory-panel" role="region" aria-label="Inventory">
                <div>
                    <div class="inventory-panel-inner">
                        <ul id="inventory-list"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main story area -->
        <main id="story-container" role="main">
            <!-- Story text and choices append here dynamically -->
        </main>
        <button id="scroll-bottom-btn" class="scroll-bottom-btn" aria-label="Scroll to bottom" hidden>
            <img src="assets/icons/arrow-down.svg" alt="" width="22" height="22">
        </button>
        <div id="tts-controls" hidden>
            <button id="tts-pause-btn" class="tts-ctrl-btn" aria-label="Pause">
                <img id="tts-pause-icon" src="assets/icons/pause.svg" alt="" width="20" height="20">
            </button>
            <button id="tts-speed-btn" class="tts-ctrl-btn" aria-label="Normal speed">
                <img id="tts-speed-icon" src="assets/icons/walking.svg" alt="" width="20" height="20">
            </button>
        </div>
    </div>

    <!-- Restart confirmation modal -->
    <div id="restart-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
        <div class="modal">
            <h2 id="modal-title">Restart the game?</h2>
            <p>All progress will be lost and cannot be undone.</p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">Restart</button>
            </div>
        </div>
    </div>

    <!-- Rewind confirmation modal -->
    <div id="rewind-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="rewind-modal-title" hidden>
        <div class="modal">
            <h2 id="rewind-modal-title">Rewind to checkpoint?</h2>
            <p>Your progress since the last checkpoint will be lost.</p>
            <div class="modal-actions">
                <button id="rewind-modal-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="rewind-modal-confirm-btn" class="modal-btn modal-btn-confirm">Rewind</button>
            </div>
        </div>
    </div>

    <!-- Load inkjs locally -->
    <script src="ink.js"></script>
    <!-- Load our app -->
    <script src="app.js"></script>
</body>
</html>
