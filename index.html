<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive Dwemer facility exploration in Skyrim">
    <title>The Dwemer Facility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-actions">
                <button id="restart-btn" class="header-btn" aria-label="Restart game">
                    <img src="assets/restart.svg" alt="" width="24" height="24">
                </button>
                <button id="rewind-btn" class="header-btn" aria-label="Load last checkpoint" disabled>
                    <img src="assets/rewind.svg" alt="" width="24" height="24">
                </button>
            </div>
            <h1>The Dwemer Facility</h1>
        </header>

        <!-- Main story area -->
        <main id="story-container" role="main">
            <!-- Story text and choices append here dynamically -->
        </main>
    </div>

    <!-- Load inkjs locally -->
    <script src="ink.js"></script>
    <!-- Load our app -->
    <script src="app.js"></script>
</body>
</html>
