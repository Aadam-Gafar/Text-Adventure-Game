<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive Dwemer facility exploration in Skyrim">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <title>The Dwemer Facility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica:ital@0;1&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <img src="assets/favicon.svg" alt="" width="28" height="28" class="header-favicon">
            <h1>The Dwemer Facility</h1>
            <div class="header-quick-actions">
                <button id="restart-btn" class="header-btn" aria-label="Restart game">
                    <img src="assets/restart.svg" alt="" width="24" height="24">
                </button>
                <button id="rewind-btn" class="header-btn" aria-label="Load last checkpoint" disabled>
                    <img src="assets/rewind.svg" alt="" width="24" height="24">
                </button>
            </div>
            <div class="header-actions">
                <button id="theme-btn" class="header-btn" aria-label="Toggle dark mode">
                    <img src="assets/theme.svg" alt="" width="24" height="24">
                </button>
                <button id="dyslexic-btn" class="header-btn" aria-label="Toggle dyslexia-friendly font">
                    <img src="assets/glasses.svg" alt="" width="24" height="24">
                </button>
                <button class="header-btn zoom-out-btn" aria-label="Decrease font size">
                    <img src="assets/zoom-out.svg" alt="" width="24" height="24">
                </button>
                <button class="header-btn zoom-in-btn" aria-label="Increase font size">
                    <img src="assets/zoom-in.svg" alt="" width="24" height="24">
                </button>
                <button id="volume-btn" class="header-btn" aria-label="Volume: High">
                    <img id="volume-icon" src="assets/sound-high.svg" alt="" width="24" height="24">
                </button>
                <button id="menu-btn" class="header-btn mobile-menu-btn" aria-label="Open menu">
                    <img src="assets/menu.svg" alt="" width="24" height="24">
                </button>
            </div>
        </header>

        <!-- Main story area -->
        <main id="story-container" role="main">
            <!-- Story text and choices append here dynamically -->
        </main>
        <button id="scroll-bottom-btn" class="scroll-bottom-btn" aria-label="Scroll to bottom" hidden>
            <img src="assets/arrow-down.svg" alt="" width="22" height="22">
        </button>
    </div>

    <!-- Restart confirmation modal -->
    <div id="restart-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
        <div class="modal">
            <h2 id="modal-title">Restart the game?</h2>
            <p>All progress will be lost and cannot be undone.</p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">Restart</button>
            </div>
        </div>
    </div>

    <!-- Load inkjs locally -->
    <script src="ink.js"></script>
    <!-- Load our app -->
    <script src="app.js"></script>
</body>
</html>
